  <!-- Title bar -->
  <line x1="10" y1="36" x2="118" y2="36" stroke="#a78bfa" stroke-width="3.5"/>
  
  <!-- Title bar dots -->
  <circle cx="24" cy="26" r="3" fill="#a78bfa" opacity="0.4"/>
  <circle cx="35" cy="26" r="3" fill="#a78bfa" opacity="0.4"/>
  <circle cx="46" cy="26" r="3" fill="#a78bfa" opacity="0.4"/>
  
  <!-- Chevron prompt -->
